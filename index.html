<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance | Aibel Builders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --accent: #9d816a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            background-image: linear-gradient(rgba(5,5,5,0.85), rgba(5,5,5,0.95)), url('assets/arch_hero.png');
            background-size: cover;
            background-position: center;
        }
        .maintenance-content {
            padding: 4rem 3rem;
            max-width: 600px;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .maintenance-content img {
            max-width: 150px;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--accent);
            font-weight: 500;
            letter-spacing: 1px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #d1d1d1;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(157, 129, 106, 0.15);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .maintenance-content {
                padding: 3rem 1.5rem;
                margin: 0 1rem;
            }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="maintenance-content">
        <img src="assets/Logo.png" alt="Aibel Builders Logo">
        <h1>Under Maintenance</h1>
        <p>We are currently undertaking scheduled maintenance to elevate our digital experience. We will be back online shortly. Thank you for your patience.</p>
        <div class="loader"></div>
    </div>
</body>
</html>
